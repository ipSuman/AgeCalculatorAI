<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Age Calculator AI - Phase 4</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
<div class="card">
<h1>🎂 Age Calculator AI</h1>
<div class="grid">
<div><label>Name</label><input id="name"></div>
<div><label>Date of Birth</label><input id="dob" type="date"></div>
</div>
<button id="calc">Calculate</button>
</div>

<div class="card">
<h2>Report</h2>
<div id="report">Ready.</div>
<div class="actions">
<button id="copy">📋 Copy</button>
<button id="download">💾 Download TXT</button>
<button onclick="window.print()">🖨️ Print</button>
</div>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
